modules:
  - type: dnf
    source: local
    repos:
      cleanup: true # clean up added repos after module is done
      copr:
        - name: solopasha/hyprland
          chroot: fedora-42-x86_64
    install:
      skip-unavailable: true # skip unavailable packages
      packages:
        - niri
        - fuzzel
        - swayidle
        - swaylock
        - pavucontrol
        - xwayland-satellite

        - repo: copr:copr.fedorainfracloud.org:solopasha:hyprland
          packages:
            - swww
            - waybar-git
            - astal
            - astal-gjs
            - astal-gtk4
            - astal-io
            - astal-libs
            - astal-lua
            - appmenu-glib-translator
            - aylurs-gtk-shell2
